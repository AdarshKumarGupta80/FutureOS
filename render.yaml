databases:
  - name: futureos-mysql
    databaseName: futureos
    user: futureos
    plan: free
    region: oregon

services:
  - type: web
    name: futureos-ai
    runtime: docker
    dockerfilePath: ./ai-service/Dockerfile
    dockerContext: ./ai-service
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: AI_MODEL
        value: llama-3.3-70b-versatile

  - type: web
    name: futureos-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    envVars:
      - key: DB_URL
        value: jdbc:mysql://${futureos-mysql.host}:${futureos-mysql.port}/futureos?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - key: DB_USERNAME
        fromDatabase:
          name: futureos-mysql
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: futureos-mysql
          property: password
      - key: JWT_SECRET
        sync: false
      - key: AI_BASE_URL
        value: https://futureos-ai.onrender.com

  - type: web
    name: futureos-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    region: oregon
    envVars:
      - key: VITE_API_BASE
        value: https://futureos-backend.onrender.com/api