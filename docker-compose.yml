services:
  postgres:
    image: postgres:16
    container_name: futureos-postgres
    environment:
      POSTGRES_DB: futureos
      POSTGRES_USER: ${POSTGRES_USER:-futureos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-futureos}
    ports:
      - "5432:5432"
    volumes:
      - futureos_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-futureos}"]
      interval: 10s
      timeout: 5s
      retries: 10

  ai-service:
    build:
      context: ./ai-service
    container_name: futureos-ai
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-llama-3.3-70b-versatile}
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8001/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: futureos-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/futureos
      DB_USERNAME: ${POSTGRES_USER:-futureos}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-futureos}
      JWT_SECRET: ${JWT_SECRET:-futureos-local-development-secret-change-me-please-123456}
      AI_BASE_URL: http://ai-service:8001
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8080/api}
    container_name: futureos-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  futureos_postgres: