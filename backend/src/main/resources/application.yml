server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/futureos
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

futureos:
  jwt-secret: ${JWT_SECRET}
  ai-base-url: ${AI_BASE_URL}

logging:
  level:
    com.futureos: DEBUG