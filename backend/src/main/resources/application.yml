server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/futureos?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

futureos:
  jwt-secret: ${JWT_SECRET:i_am_microservice_and_i_have_secret_messages_and_i_am_long_enough}
  ai-base-url: ${AI_BASE_URL:http://localhost:8001}

logging:
  level:
    com.futureos: DEBUG