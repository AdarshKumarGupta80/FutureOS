server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/futureos?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      # Use "update" locally, switch to "validate" once schema is stable in prod
      ddl-auto: ${DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

futureos:
  jwt-secret: ${JWT_SECRET}
  ai-base-url: ${AI_BASE_URL:http://localhost:8001}

logging:
  level:
    com.futureos: DEBUG